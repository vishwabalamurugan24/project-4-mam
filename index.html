<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LIFESAVER | V2V Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#d32f2f",
                        "surface": "#131313",
                        "outline": "#ab8985",
                        "on-surface-variant": "#e4beba",
                        "surface-bright": "#393939",
                        "primary": "#ffb3ac",
                        "secondary": "#a5c8ff",
                        "background": "#131313",
                        "on-background": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "surface-variant": "#353534",
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
    <style>
        .map-gradient { background: linear-gradient(to bottom, rgba(19, 19, 19, 1) 0%, rgba(19, 19, 19, 0.4) 50%, rgba(19, 19, 19, 1) 100%); }
        .hero-glow { box-shadow: 0 0 100px rgba(211, 47, 47, 0.2); }
    </style>
</head>
<body class="bg-background text-on-background font-body h-screen flex flex-col relative overflow-hidden">
    <!-- Header -->
    <header class="flex justify-between items-center w-full px-12 py-6 z-50 absolute top-0">
        <div class="flex items-center gap-4">
            <span class="font-headline font-black tracking-tighter text-3xl text-primary uppercase">LIFESAVER</span>
        </div>
        <div class="flex gap-8 items-center">
            <a href="login.html" class="font-label tracking-widest text-sm hover:text-secondary hover:scale-105 transition-all text-on-background/70">LOGIN</a>
            <a href="register.html" class="font-label font-bold tracking-widest text-sm bg-surface-container-highest hover:bg-white hover:text-black py-3 px-8 rounded-sm transition-all border border-outline/30 uppercase">Register</a>
        </div>
    </header>

    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <img class="w-full h-full object-cover opacity-30 grayscale mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyzre0P1pmQ75xDUmlBcC4wb-sp7QHu632RcPLvc0CfR6hahgSKijQ86Kx-c_118vIT_Cgo2WyTddlgS0Am5ix0rQ0A4_dGTsp3dAKFVVW-Uiq6BR6m1S_8nCemPZdUcQ6czgNMOjKZytZYJcDMWWEppqLc3aMKqHW66mxSA0Po8kpp7fQ1-qN9C0S8BncOXbIDmwcGH_rhWfd9EdAoemIDYOYvUvW8WBMlyqyHQKF1ZzJN8S5tiQ_2QR-RWG1PWsu5EShAMdrkw" alt="Urban Grid">
        <div class="absolute inset-0 map-gradient"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center z-10 text-center px-4 pt-16">
        <div class="max-w-4xl hero-glow rounded-3xl p-10 bg-black/20 backdrop-blur-sm border border-outline/10">
            <h1 class="font-headline font-black text-6xl md:text-8xl tracking-tighter leading-[0.9] text-white mb-6">
                CLEAR. <span class="text-primary">AHEAD.</span>
            </h1>
            <p class="font-label text-lg md:text-2xl text-on-surface-variant font-light max-w-2xl mx-auto mb-12">
                The world's first V2V connectivity framework strictly designed to optimize ambulance trajectory and eliminate civilian congestion using distributed intelligence.
            </p>
            <div class="flex flex-wrap gap-6 justify-center">
                <a href="admin.html" class="bg-primary-container text-white font-label font-bold py-4 px-10 tracking-widest uppercase rounded hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary-container/20 border border-primary-container">Enter Command Center</a>
                <a href="driver.html" class="bg-transparent backdrop-blur-md border border-white/20 text-white font-label font-bold py-4 px-10 tracking-widest uppercase hover:bg-white/10 hover:border-white transition-all rounded">Simulate Driver</a>
            </div>
        </div>
    </main>

    <!-- Footer links to pages -->
    <footer class="z-10 py-6 border-t border-white/10 flex justify-center gap-6 bg-black/40 backdrop-blur-md relative font-label text-xs uppercase tracking-widest text-on-background/40">
        <a href="ambulance.html" class="hover:text-white transition-colors">Ambulance UI</a>
        <a href="tracking.html" class="hover:text-white transition-colors">Live Map</a>
        <a href="traffic.html" class="hover:text-white transition-colors">Traffic Grid</a>
        <a href="analytics.html" class="hover:text-white transition-colors">Analytics</a>
        <a href="contact.html" class="hover:text-white transition-colors">Support</a>
    </footer>
</body>
</html>
