<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LIFESAVER | Driver Alert</title>

                      "secondary": "#446084",
                      "on-error-container": "#93000a",

                      "on-secondary-container": "#3f5b7f",
                      "on-tertiary-container": "#fffbff",
                      "on-error": "#ffffff",
                      "on-tertiary-fixed-variant": "#93000d",
                      "primary-container": "#0077ce",
                      "surface-container": "#eeeeee",
                      "on-tertiary": "#ffffff",
                      "inverse-primary": "#a2c9ff",
                      "tertiary-fixed": "#ffdad6",
                      "tertiary-container": "#db322f",
                      "outline": "#707783",
                      "on-secondary": "#ffffff",
                      "error": "#ba1a1a",
                      "on-surface": "#1a1c1c",
                      "on-tertiary-fixed": "#410002",
                      "primary-fixed": "#d3e4ff",
                      "surface-dim": "#dadada",
                      "on-primary-fixed-variant": "#004881",
                      "on-background": "#1a1c1c",
                      "surface-bright": "#f9f9f9",
                      "tertiary": "#b7131a",
                      "error-container": "#ffdad6",
                      "on-primary-fixed": "#001c38",
                      "tertiary-fixed-dim": "#ffb4ac",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#a2c9ff",
                      "surface-tint": "#0060a8",
                      "primary": "#005ea4",
                      "on-secondary-fixed-variant": "#2b486b",
                      "outline-variant": "#c0c7d4",
                      "secondary-fixed-dim": "#acc8f2",
                      "surface": "#f9f9f9",
                      "inverse-surface": "#2f3131",
                      "surface-variant": "#e2e2e2",
                      "secondary-container": "#b7d4fd",
                      "on-secondary-fixed": "#001c38",
                      "surface-container-low": "#f3f3f3",
                      "on-surface-variant": "#404752",
                      "inverse-on-surface": "#f1f1f1"

              "borderRadius": {
                      "DEFAULT": "0.125rem",

                      "full": "0.75rem"

              "fontFamily": {
                      "headline": ["Inter"],
                      "body": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .emergency-pulse {
            box-shadow: 0 0 0 0 rgba(183, 19, 26, 0.7);
        }
        .tactical-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
      </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden h-screen flex flex-col">
<style>
        .emergency-hud { display: none; }
        body.emergency-active .emergency-hud { display: block; }
        body.emergency-active .emergency-flex { display: flex; }
    </style>

<!-- TopNavBar: SUPPRESSED as this is a focused, task-critical alert screen -->
<!-- Main Content Canvas -->
<main class="flex-1 relative flex flex-col w-full h-full">
<!-- CRITICAL ALERT BANNER (High Visibility) -->
<div class="emergency-hud z-30 w-full bg-tertiary-container p-6 flex flex-col items-center justify-center shadow-2xl">
<div class="flex items-center gap-4 mb-2">
<span class="material-symbols-outlined text-on-tertiary-container text-4xl" style="font-variation-settings: 'FILL' 1;">emergency</span>
<h1 class="text-on-tertiary-container font-headline text-3xl md:text-5xl font-extrabold tracking-tighter uppercase">AMBULANCE APPROACHING</h1>
</div>
<p class="text-on-tertiary-container/90 text-sm md:text-lg font-bold tracking-widest uppercase">Yield Immediately</p>
</div>
<!-- CONTENT AREA: ASYMMETRIC HUD LAYOUT -->
<div class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-0 relative">
<!-- TACTICAL MAP BACKGROUND -->
<div class="col-span-1 md:col-span-12 relative overflow-hidden bg-surface-container-high">
<img class="w-full h-full object-cover grayscale contrast-125 opacity-40" data-alt="Modern dark-themed GPS navigation map with a highlighted emergency vehicle icon and directional glowing path through city streets" data-location="Chicago" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARRqfzraHvQwVvO6P2WE2R2ad9mwRlBLC7cIfSyoutqSc31qfVp3R0YaL8I6M7wkde51AmNr5CIFigjUicJ4g9A76vo28PHxSkVBeASSIR6DBAlYqdbIgkXDQRLCFPuj6WyjA53bS2D9jOffvTyAGDKfGCVFLeSKyVi9YxGGLyKVfjdazwBB7y93321fF-LSpNmeNdrReCpSIoxNYIkiP4yiLpWGud7jVhNld56Z_fGZnxgtS636xHUbXTcCJBjaqw-H39dk8EAQ"/>
<!-- DIRECTIONAL OVERLAY (The Instructions) -->
<div class="emergency-hud absolute inset-0 flex flex-col items-center justify-center pointer-events-none p-4">
<div class="bg-surface-container-lowest/90 tactical-glass p-8 rounded-full border-4 border-primary shadow-2xl flex flex-col items-center text-center max-w-sm">
<span class="material-symbols-outlined text-primary text-8xl mb-4" style="font-variation-settings: 'wght' 700;">turn_slight_right</span>
<h2 class="text-primary font-headline text-5xl font-black leading-tight tracking-tighter">MOVE TO RIGHT</h2>
</div>
</div>
<!-- HUD DATA OVERLAYS -->
<!-- PROXIMITY CARD -->
<div class="emergency-hud absolute top-8 left-8 z-20">
<div class="bg-surface-container-lowest tactical-glass p-6 rounded-xl shadow-lg border-l-8 border-primary w-64">
<div class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest font-bold mb-1">Distance to Vehicle</div>
<div class="flex items-baseline gap-1">
<span class="text-4xl font-headline font-black text-on-surface tracking-tighter">450</span>
<span class="text-xl font-headline font-bold text-on-surface-variant uppercase">m</span>
</div>
<div class="mt-4 flex items-center gap-2">
<div class="h-2 flex-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
</div>
</div>
</div>
<!-- ETA CARD -->
<div class="emergency-hud absolute top-8 right-8 z-20">
<div class="bg-surface-container-lowest tactical-glass p-6 rounded-xl shadow-lg border-l-8 border-tertiary w-64">
<div class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest font-bold mb-1">Estimated Intercept</div>
<div class="flex items-baseline gap-1">
<span class="text-4xl font-headline font-black text-tertiary tracking-tighter">00:12</span>
<span class="text-xl font-headline font-bold text-on-surface-variant uppercase">sec</span>
</div>
<div class="mt-4 flex items-center gap-2 text-tertiary">
<span class="material-symbols-outlined text-sm">speed</span>
<span class="text-xs font-bold uppercase tracking-wider">High Velocity</span>
</div>
</div>
</div>
<!-- MAP KEY/CONTROLS -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 flex gap-4">
<button class="bg-white px-8 py-4 rounded-full shadow-xl flex items-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">volume_up</span>
<span class="font-bold text-primary text-sm uppercase tracking-widest">Audio Alerts On</span>
</button>
<button class="bg-tertiary px-8 py-4 rounded-full shadow-xl flex items-center gap-3 active:scale-95 transition-transform text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-bold text-sm uppercase tracking-widest">Acknowledged</span>
</button>
</div>
</div>
</div>
</main>
<!-- FOOTER: Tactical metadata for System Integrity -->
<footer class="w-full py-4 mt-auto bg-white border-t border-surface-container flex justify-between items-center px-8 z-40">
<div class="flex items-center gap-6">
<span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">LIFESAVER CORE v4.2.1</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="text-[10px] uppercase tracking-widest font-semibold text-primary">GPS LOCKED</span>
</div>
</div>
<div class="flex gap-4">
<span class="text-[10px] uppercase tracking-widest font-semibold text-on-surface-variant">© 2024 LIFESAVER Systems. All Rights Reserved.</span>
</div>
</footer>
<!-- EMERGENCY ALERT SHADE (Ambient Glow) -->
<div class="emergency-hud fixed inset-0 pointer-events-none ring-[16px] ring-tertiary/20 animate-pulse z-50"></div>
<script>
        const emergencyChannel = new BroadcastChannel('lifesaver_emergencies');
        
        emergencyChannel.onmessage = (event) => {
            if (event.data.type === 'emergency_start') {
                document.body.classList.add('emergency-active');
                // Optional: Play alert sound simulation
                console.log('Emergency Alert: Ambulance approaching from', event.data.ambulanceId);
            } else if (event.data.type === 'emergency_stop') {
                document.body.classList.remove('emergency-active');
            }
        };
    </script>

</body></html>
