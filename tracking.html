<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LIFESAVER | Live Tracking</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface": "#131313", "primary": "#ffb3ac", "primary-container": "#d32f2f", "background": "#131313", "on-background": "#e5e2e1", "tertiary": "#82db7e" }, fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Space Grotesk"] }}}}
    </script>
</head>
<body class="bg-background text-on-background font-body h-screen flex relative overflow-hidden">
    <!-- Navbar (Top floating) -->
    <nav class="absolute top-6 left-6 right-6 flex justify-between z-50 pointer-events-none">
        <div class="pointer-events-auto bg-[#1C1B1B]/80 backdrop-blur-md border border-white/10 rounded-full px-6 py-3 flex gap-6 items-center">
            <a href="admin.html" class="material-symbols-outlined text-white hover:text-primary transition-colors text-xl">arrow_back</a>
            <span class="font-headline font-black text-xl text-primary tracking-tighter uppercase">LIFESAVER Tracking</span>
        </div>
        <div class="pointer-events-auto bg-[#1C1B1B]/80 backdrop-blur-md border border-white/10 rounded-full px-6 py-3 flex gap-6 items-center">
            <span class="font-label text-xs uppercase tracking-widest text-tertiary">GPS Active</span>
        </div>
    </nav>

    <!-- Map Fullscreen -->
    <div class="absolute inset-0 z-0 bg-[#0e0e0e]">
        <img class="w-full h-full object-cover opacity-60 grayscale filter contrast-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyzre0P1pmQ75xDUmlBcC4wb-sp7QHu632RcPLvc0CfR6hahgSKijQ86Kx-c_118vIT_Cgo2WyTddlgS0Am5ix0rQ0A4_dGTsp3dAKFVVW-Uiq6BR6m1S_8nCemPZdUcQ6czgNMOjKZytZYJcDMWWEppqLc3aMKqHW66mxSA0Po8kpp7fQ1-qN9C0S8BncOXbIDmwcGH_rhWfd9EdAoemIDYOYvUvW8WBMlyqyHQKF1ZzJN8S5tiQ_2QR-RWG1PWsu5EShAMdrkw" alt="Live Map">
        <!-- Overlay elements to simulate route -->
        <div class="absolute top-1/2 left-1/4 w-96 h-1 bg-primary/80 transform rotate-12 -translate-y-1/2 shadow-[0_0_20px_#ffb3ac]"></div>
        <div class="absolute top-1/2 left-1/4 w-6 h-6 bg-white rounded-full transform rotate-12 -translate-y-1/2 -translate-x-3 shadow-[0_0_20px_#fff] flex items-center justify-center">
            <div class="w-2 h-2 bg-primary rounded-full animate-ping"></div>
        </div>
        <!-- Target Hospital -->
        <div class="absolute top-[40%] right-[30%] flex flex-col items-center">
            <span class="material-symbols-outlined text-4xl text-tertiary shadow-xl drop-shadow-[0_0_15px_rgba(130,219,126,0.8)]" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
            <span class="bg-black/80 font-label text-[10px] uppercase text-white tracking-widest px-2 py-1 rounded mt-2 border border-tertiary/30">St. Jude</span>
        </div>
    </div>

    <!-- Info Panel Bottom -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-[#1C1B1B]/90 backdrop-blur-xl border border-white/10 p-6 rounded-2xl w-full max-w-2xl flex justify-between shadow-2xl z-20">
        <div class="flex flex-col">
            <span class="font-label text-[10px] tracking-widest text-[#E5E2E1]/50 uppercase mb-1">Target Identity</span>
            <span class="font-headline font-black text-2xl uppercase">AMB-742</span>
        </div>
        <div class="h-10 w-[1px] bg-white/10 self-center"></div>
        <div class="flex flex-col">
            <span class="font-label text-[10px] tracking-widest text-[#E5E2E1]/50 uppercase mb-1">Velocity</span>
            <span class="font-headline font-black text-2xl uppercase text-white">65 <span class="text-xs text-white/50">KM/H</span></span>
        </div>
        <div class="h-10 w-[1px] bg-white/10 self-center"></div>
        <div class="flex flex-col">
            <span class="font-label text-[10px] tracking-widest text-[#E5E2E1]/50 uppercase mb-1">V2V Relays</span>
            <span class="font-headline font-black text-2xl uppercase text-white">1,402 <span class="text-xs text-white/50">NODES</span></span>
        </div>
    </div>
</body>
</html>
