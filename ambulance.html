<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LIFESAVER | Ambulance Dispatch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface": "#131313", "primary": "#ffb3ac", "primary-container": "#d32f2f", "background": "#131313", "on-background": "#e5e2e1", "tertiary": "#82db7e" }, fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Space Grotesk"] }}}}
    </script>
    <style>
        .map-gradient { background: linear-gradient(to right, rgba(19, 19, 19, 1) 0%, rgba(19, 19, 19, 0) 50%, rgba(19, 19, 19, 1) 100%); }
    </style>
</head>
<body class="bg-background text-on-background font-body h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <nav class="w-64 bg-[#1C1B1B] border-r border-white/10 flex flex-col h-full shrink-0 z-20">
        <div class="p-6">
            <h1 class="font-headline font-black text-2xl text-primary tracking-tighter uppercase">LIFESAVER</h1>
            <p class="font-label text-[10px] text-on-background/50 tracking-widest uppercase">System Menu</p>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-2 flex flex-col gap-1">
            <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">home</span><span class="font-label text-xs uppercase tracking-widest">Home</span></a>
            <a href="admin.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">admin_panel_settings</span><span class="font-label text-xs uppercase tracking-widest">Admin Control</span></a>
            <a href="ambulance.html" class="flex items-center gap-3 px-3 py-2 rounded bg-primary/10 text-primary border-l-2 border-primary transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">medical_services</span><span class="font-label text-xs uppercase tracking-widest font-bold">Ambulance</span></a>
            <a href="driver.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">directions_car</span><span class="font-label text-xs uppercase tracking-widest">Driver Alert</span></a>
            <a href="tracking.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">map</span><span class="font-label text-xs uppercase tracking-widest">Live Tracking</span></a>
            <a href="traffic.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">traffic</span><span class="font-label text-xs uppercase tracking-widest">Traffic Mgmt</span></a>
            <a href="analytics.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">analytics</span><span class="font-label text-xs uppercase tracking-widest">Analytics</span></a>
            <a href="settings.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">settings</span><span class="font-label text-xs uppercase tracking-widest">Settings</span></a>
            <a href="contact.html" class="flex items-center gap-3 px-3 py-2 rounded text-white/50 hover:bg-[#2A2A2A] hover:text-white transition-colors cursor-pointer"><span class="material-symbols-outlined text-[18px]">help</span><span class="font-label text-xs uppercase tracking-widest">Contact/Help</span></a>
        </div>
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-tertiary" id="conn-icon">wifi</span>
                    <div>
                        <p class="font-label text-[10px] uppercase text-white/50 tracking-widest">Connection</p>
                        <p class="font-label text-xs text-tertiary font-bold tracking-widest uppercase" id="conn-status">Secure V2V</p>
                    </div>
                </div>
                <span id="refresh-btn" class="material-symbols-outlined cursor-pointer hover:text-white text-white/50" onclick="fetchActiveIncident()">sync</span>
            </div>
        </div>
    </nav>

    <!-- Main Map/Content area -->
    <main class="flex-1 relative bg-black">
        <img class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyzre0P1pmQ75xDUmlBcC4wb-sp7QHu632RcPLvc0CfR6hahgSKijQ86Kx-c_118vIT_Cgo2WyTddlgS0Am5ix0rQ0A4_dGTsp3dAKFVVW-Uiq6BR6m1S_8nCemPZdUcQ6czgNMOjKZytZYJcDMWWEppqLc3aMKqHW66mxSA0Po8kpp7fQ1-qN9C0S8BncOXbIDmwcGH_rhWfd9EdAoemIDYOYvUvW8WBMlyqyHQKF1ZzJN8S5tiQ_2QR-RWG1PWsu5EShAMdrkw" alt="Map Grid">
        <div class="absolute inset-0 map-gradient"></div>

        <div class="absolute inset-x-0 bottom-0 p-8 z-10 flex flex-col gap-4" id="ui-container">
            <!-- Active state container populated by JS -->
            <div class="text-white/50 animate-pulse font-label uppercase tracking-widest pl-2">Syncing telemetry data...</div>
        </div>
    </main>

    <!-- Client-side Logic -->
    <script>
        const API_URL = 'http://localhost:5000/api';

        async function fetchActiveIncident() {
            const container = document.getElementById('ui-container');
            const icon = document.getElementById('refresh-btn');
            const statusText = document.getElementById('conn-status');
            const connIcon = document.getElementById('conn-icon');
            
            try {
                icon.classList.add('animate-spin');
                
                // Fetch emergencies
                const response = await fetch(`${API_URL}/emergencies`);
                if(!response.ok) throw new Error("Failed to fetch.");
                const emergencies = await response.json();
                
                statusText.innerText = "Secure V2V";
                statusText.className = "font-label text-xs text-tertiary font-bold tracking-widest uppercase";
                connIcon.className = "material-symbols-outlined text-tertiary";

                container.innerHTML = ''; // clear
                
                // Pretend AMB-742 is pulling this data, find active incident
                const active = emergencies.find(e => e.status === 'Active');

                if(!active) {
                    container.innerHTML = `
                        <div class="bg-[#1C1B1B]/90 backdrop-blur border border-white/10 p-6 rounded-xl flex items-center justify-center">
                            <h2 class="font-headline font-black text-3xl uppercase tracking-tighter text-white/50">NO ACTIVE CALLS</h2>
                        </div>
                    `;
                    return;
                }

                // Render Active Component
                container.innerHTML = `
                    <div class="flex justify-between items-end">
                        <div class="bg-[#1C1B1B]/90 backdrop-blur border border-primary/30 p-6 rounded-xl flex gap-10 items-center shadow-2xl">
                            <div>
                                <p class="font-label text-[10px] text-primary tracking-widest uppercase mb-1">Incoming Intercept • REF ${active.referenceCode}</p>
                                <h2 class="font-headline font-black text-3xl uppercase tracking-tighter">${active.priorityCode} - ${active.type}</h2>
                                <p class="font-label text-white/60 tracking-widest uppercase text-[10px] mt-1">
                                    Target Patient: ${active.patient.name} (${active.patient.bloodType}) • ${active.location.address}
                                </p>
                            </div>
                            <div class="h-12 w-[1px] bg-white/20"></div>
                            <div class="flex flex-col items-center">
                                <span class="font-label text-[10px] tracking-widest text-primary uppercase mb-1 drop-shadow">Simulate Clear</span>
                                <span class="material-symbols-outlined text-4xl text-white opacity-80 cursor-not-allowed">power_settings_new</span>
                            </div>
                        </div>

                        <button id="activate-btn" class="bg-primary-container text-white font-headline font-black text-2xl h-24 px-12 rounded-xl shadow-[0_0_50px_rgba(211,47,47,0.5)] border border-primary hover:bg-red-800 transition-colors uppercase tracking-tight" onclick="alert('Sending overriding codes to V2V network...')">
                            Activate Sirens & Clear Path
                        </button>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                statusText.innerText = "Link Offline";
                statusText.className = "font-label text-xs text-primary-container font-bold tracking-widest uppercase";
                connIcon.className = "material-symbols-outlined text-primary-container";
                
                container.innerHTML = `
                        <div class="bg-primary-container/20 backdrop-blur border border-primary-container p-6 rounded-xl">
                            <h2 class="font-headline font-black text-2xl uppercase tracking-tighter text-primary">Connection Offline</h2>
                            <p class="font-label text-white/50 tracking-widest uppercase text-xs mt-1">Cannot reach dispatch backend server.</p>
                        </div>
                `;
            } finally {
                icon.classList.remove('animate-spin');
            }
        }

        // Fetch on load
        fetchActiveIncident();
        
        // Auto refresh
        setInterval(fetchActiveIncident, 10000);
    </script>
</body>
</html>
