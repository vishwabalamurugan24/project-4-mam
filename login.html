<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LIFESAVER | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface": "#131313", "primary": "#ffb3ac", "primary-container": "#d32f2f", "background": "#131313", "on-background": "#e5e2e1" }, fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Space Grotesk"] }}}}
    </script>
</head>
<body class="bg-background text-on-background font-body h-screen flex relative">
    <div class="hidden md:flex w-1/2 relative bg-black items-center justify-center overflow-hidden">
        <img class="w-full h-full object-cover opacity-40 grayscale mix-blend-screen scale-110 blur-sm" src="https://images.unsplash.com/photo-1542314831-c6a4d14abac2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Ambulance Night">
        <div class="absolute inset-0 bg-gradient-to-r from-background/0 to-background border-r border-white/5"></div>
        <div class="absolute bottom-12 left-12">
            <h1 class="font-headline font-black text-6xl text-white tracking-tighter uppercase opacity-80">Lifesaver Authentication</h1>
            <p class="font-label text-xl tracking-widest text-primary/80 mt-2 uppercase">Secure Gateway</p>
        </div>
    </div>
    <div class="w-full md:w-1/2 flex flex-col items-center justify-center p-8 bg-surface">
        <div class="w-full max-w-md">
            <a href="index.html" class="inline-flex items-center gap-2 text-primary/50 hover:text-primary mb-12 font-label uppercase tracking-widest text-xs transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Return to Surface
            </a>
            <h2 class="font-headline font-black text-4xl mb-8 tracking-tight">System Login</h2>
            
            <form action="admin.html" class="flex flex-col gap-6">
                <!-- Role Selector -->
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" class="peer sr-only" checked>
                        <div class="p-4 rounded border border-white/10 text-center font-label text-xs uppercase tracking-widest text-white/40 peer-checked:bg-white/10 peer-checked:text-white peer-checked:border-primary transition-all">Operator</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" class="peer sr-only">
                        <div class="p-4 rounded border border-white/10 text-center font-label text-xs uppercase tracking-widest text-white/40 peer-checked:bg-white/10 peer-checked:text-white peer-checked:border-primary transition-all">Driver</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" class="peer sr-only">
                        <div class="p-4 rounded border border-white/10 text-center font-label text-xs uppercase tracking-widest text-white/40 peer-checked:bg-white/10 peer-checked:text-white peer-checked:border-primary transition-all">Admin</div>
                    </label>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50">V2V ID or Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-xl">badge</span>
                        <input type="text" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 pl-12 pr-4 font-body text-white placeholder-white/20 focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="ID-842-Alpha">
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50">Passphrase</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-xl">lock</span>
                        <input type="password" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 pl-12 pr-4 font-body text-white placeholder-white/20 focus:border-primary focus:ring-1 focus:ring-primary transition-all" value="••••••••••••">
                    </div>
                </div>

                <div class="flex justify-between items-center mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-white/20 bg-[#1C1B1B] text-primary focus:ring-primary/50">
                        <span class="font-label text-[10px] tracking-wide text-white/50">Remember Token</span>
                    </label>
                    <a href="#" class="font-label text-[10px] tracking-wide text-primary hover:underline">Reset Keys</a>
                </div>

                <button type="submit" class="w-full bg-white text-black font-label font-bold tracking-widest uppercase py-4 rounded hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                    Authenticate <span class="material-symbols-outlined">login</span>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="font-label text-[10px] tracking-widest uppercase text-white/40">Unauthorized access is strictly prohibited.</p>
                <a href="register.html" class="inline-block mt-4 font-label text-xs tracking-widest uppercase text-primary hover:text-white border-b border-primary/30 pb-1 transition-all">Request Access Clearance</a>
            </div>
        </div>
    </div>
</body>
</html>
