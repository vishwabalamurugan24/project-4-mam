<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LIFESAVER | Emergency Dispatch Request</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d3e4ff",
                        "surface-container-high": "#e8e8e8",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9f9",
                        "primary": "#005ea4",
                        "tertiary": "#b7131a",
                        "outline": "#707783",
                        "on-surface": "#1a1c1c"
                    },
                    "borderRadius": { "xl": "0.5rem", "2xl": "1rem" }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .sentinel-shadow { box-shadow: 0px 24px 48px rgba(0, 28, 56, 0.08); }
        .tactical-gradient { background: linear-gradient(180deg, #0077CE 0%, #005EA4 100%); }
    </style>
</head>
<body class="bg-[#F5F5F5] font-body text-on-surface min-h-screen flex flex-col">
    <header class="fixed top-0 w-full z-50 bg-white/85 backdrop-blur-md shadow-sm h-16 flex items-center justify-between px-12">
        <div class="flex items-center gap-2">
            <span class="text-xl font-extrabold tracking-tighter text-slate-900 uppercase">LIFESAVER</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-bold text-tertiary animate-pulse uppercase tracking-[0.2em]">Prioritizing Event</span>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-20 flex justify-center items-start px-6">
        <div class="max-w-2xl w-full">
            <div class="bg-white p-10 rounded-2xl sentinel-shadow">
                <header class="mb-10 text-center">
                    <div class="w-16 h-16 bg-tertiary/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <span class="material-symbols-outlined text-tertiary text-3xl" style="font-variation-settings: 'FILL' 1;">emergency_share</span>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2">Initialize Emergency Protocol</h1>
                    <p class="text-slate-500 text-sm">Providing tactical intelligence for immediate V2V dispatch response.</p>
                </header>

                <form class="space-y-8" id="bookingForm">
                    <!-- Location Intel -->
                    <div class="space-y-4">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-outline">Extraction Location</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">my_location</span>
                            <input type="text" placeholder="Scanning current coordinates... (Enter Manual Address)" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-primary/20 font-medium text-sm" required>
                        </div>
                    </div>

                    <!-- Destination Selection -->
                    <div class="space-y-4">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-outline">Target Medical Facility</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <label class="relative p-4 border-2 border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-all peer-checked:border-primary group">
                                <input type="radio" name="hospital" class="sr-only peer" checked>
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                                        <span class="material-symbols-outlined text-primary text-lg">local_hospital</span>
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold uppercase">City General</p>
                                        <p class="text-[10px] text-slate-400">0.8km | Optimal Corridor</p>
                                    </div>
                                </div>
                                <div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                            </label>
                            <label class="relative p-4 border-2 border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-all group">
                                <input type="radio" name="hospital" class="sr-only peer">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
                                        <span class="material-symbols-outlined text-slate-400 text-lg">local_hospital</span>
                                    </div>
                                    <div>
                                        <p class="text-xs font-bold uppercase">Metropolitan Medical</p>
                                        <p class="text-[10px] text-slate-400">2.4km | High Congestion</p>
                                    </div>
                                </div>
                                <div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                            </label>
                        </div>
                    </div>

                    <!-- Severity Assessment -->
                    <div class="space-y-4">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-outline">Incident Severity Matrix</label>
                        <select class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-primary/20 font-medium text-sm uppercase">
                            <option>Minor / Non-Life Threatening</option>
                            <option>Critical / Life-Safety Immediate</option>
                            <option>Trauma / Multi-Unit Required</option>
                        </select>
                    </div>

                    <!-- Action -->
                    <button type="submit" class="w-full bg-tertiary text-white py-5 rounded-xl font-black uppercase tracking-widest text-xs sentinel-shadow active:scale-[0.98] transition-all hover:brightness-110 flex items-center justify-center gap-2">
                        SIGNAL DISPATCH
                        <span class="material-symbols-outlined text-lg">bolt</span>
                    </button>
                    <a href="index.html" class="block text-center text-[10px] uppercase tracking-widest font-bold text-outline hover:text-on-surface transition-colors mt-6">Cancel Protocol</a>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> SYNCHRONIZING WITH V2V MESH...';
            btn.disabled = true;
            
            setTimeout(() => {
                window.location.href = 'tracking.html';
            }, 1500);
        });
    </script>
</body>
</html>
