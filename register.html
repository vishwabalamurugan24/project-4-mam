<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LIFESAVER | Registration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface": "#131313", "primary": "#ffb3ac", "background": "#131313", "on-background": "#e5e2e1" }, fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Space Grotesk"] }}}}
    </script>
</head>
<body class="bg-background text-on-background font-body h-screen flex relative overflow-hidden">
    <div class="w-full flex flex-col items-center justify-center p-8 bg-surface/90 relative z-10">
        
        <div class="absolute inset-0 z-0 flex items-center justify-center opacity-5">
            <span class="material-symbols-outlined text-[600px]">verified_user</span>
        </div>

        <div class="w-full max-w-xl bg-black/60 backdrop-blur-xl border border-white/10 rounded-xl p-10 z-10 relative">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="font-headline font-black text-3xl tracking-tight">Onboard Node</h2>
                    <p class="font-label text-xs tracking-widest text-primary/80 mt-1 uppercase">V2V Identity Generation</p>
                </div>
                <a href="login.html" class="flex items-center justify-center w-10 h-10 rounded-full border border-white/20 hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                </a>
            </div>
            
            <form action="admin.html" class="grid grid-cols-2 gap-x-6 gap-y-5">
                
                <div class="col-span-2">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">Clearance Level</label>
                    <select class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all mt-1 appearance-none">
                        <option>Civilian Node (Standard Driver)</option>
                        <option>First Responder (EMS/Fire)</option>
                        <option>Traffic Control Authority</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">Legal Name</label>
                    <input type="text" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body text-white placeholder-white/20 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="Jane Doe">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">License Plate / Vehicle ID</label>
                    <input type="text" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body" placeholder="XYZ-9821">
                </div>

                <div class="col-span-2 flex flex-col gap-1">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">Email Connection</label>
                    <input type="email" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body" placeholder="node@v2v-network.com">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">Encryption Key</label>
                    <input type="password" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body" placeholder="••••••••">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="font-label text-[10px] tracking-widest uppercase text-white/50 ml-1">Confirm Encryption</label>
                    <input type="password" class="w-full bg-[#1C1B1B] border border-white/10 rounded pt-3 pb-3 px-4 font-body" placeholder="••••••••">
                </div>

                <div class="col-span-2 mt-4 text-center">
                    <button type="submit" class="bg-primary text-black font-label font-bold tracking-widest uppercase py-4 px-12 rounded hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
                        Generate V2V Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
